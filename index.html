<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BasketHub - Tienda de Basquetbol</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container-main">
        <!-- Header/Navigation -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <h1>🏀 BasketHub</h1>
                    <p>Tu tienda oficial de basquetbol</p>
                </div>
                <div class="header-actions">
                    <button class="cart-btn" id="cartBtn">
                        🛒 Carrito (<span id="cartCount">0</span>)
                    </button>
                </div>
            </div>
        </header>

        <!-- Contenedor principal -->
        <div class="content-wrapper">
            <!-- Sidebar de filtros -->
            <aside class="sidebar">
                <h2>Categorías</h2>
                <div class="filter-group">
                    <button class="filter-btn active" data-category="all">
                        Todos los productos
                    </button>
                    <button class="filter-btn" data-category="zapatillas">
                        👟 Zapatillas
                    </button>
                    <button class="filter-btn" data-category="ropa">
                        👕 Ropa/Accesorios
                    </button>
                </div>

                <!-- Filtros específicos para zapatillas -->
                <div id="zapatillasFilters" class="filter-section hidden">
                    <h3>Filtrar Zapatillas</h3>
                    <div class="filter-group">
                        <label><strong>Marca:</strong></label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" class="brand-filter" value="Nike"> Nike</label>
                            <label><input type="checkbox" class="brand-filter" value="Adidas"> Adidas</label>
                            <label><input type="checkbox" class="brand-filter" value="Jordan"> Jordan</label>
                            <label><input type="checkbox" class="brand-filter" value="Puma"> Puma</label>
                            <label><input type="checkbox" class="brand-filter" value="Reebok"> Reebok</label>
                            <label><input type="checkbox" class="brand-filter" value="UnderArmour"> Under Armour</label>
                            <label><input type="checkbox" class="brand-filter" value="NewBalance"> New Balance</label>
                            <label><input type="checkbox" class="brand-filter" value="Anta"> Anta</label>
                            <label><input type="checkbox" class="brand-filter" value="361"> 361</label>
                            <label><input type="checkbox" class="brand-filter" value="AND1"> AND1</label>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label><strong>Talle US:</strong></label>
                        <select id="sizeFilter" class="filter-select">
                            <option value="">Todos los talles</option>
                            <option value="7.5">7.5</option>
                            <option value="8">8</option>
                            <option value="8.5">8.5</option>
                            <option value="9">9</option>
                            <option value="9.5">9.5</option>
                            <option value="10">10</option>
                            <option value="10.5">10.5</option>
                            <option value="11">11</option>
                            <option value="11.5">11.5</option>
                            <option value="12">12</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label><strong>Rango de precio:</strong></label>
                        <input type="range" id="priceRange" min="0" max="300" value="300" class="price-slider">
                        <p>Hasta: $<span id="priceValue">300</span></p>
                    </div>
                </div>

                <!-- Filtros específicos para ropa/accesorios -->
                <div id="ropaFilters" class="filter-section hidden">
                    <h3>Filtrar Ropa/Accesorios</h3>
                    <div class="filter-group">
                        <label><strong>Tipo:</strong></label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" class="ropa-type-filter" value="camiseta"> Camisetas NBA</label>
                            <label><input type="checkbox" class="ropa-type-filter" value="remera"> Remeras Manga Corta</label>
                            <label><input type="checkbox" class="ropa-type-filter" value="buzo"> Buzos</label>
                            <label><input type="checkbox" class="ropa-type-filter" value="accesorios"> Accesorios</label>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label><strong>Talle:</strong></label>
                        <select id="sizeRopaFilter" class="filter-select">
                            <option value="">Todos los talles</option>
                            <option value="XS">XS</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                            <option value="XXL">XXL</option>
                            <option value="XXXL">XXXL</option>
                        </select>
                    </div>
                </div>
            </aside>

            <!-- Grid de productos -->
            <main class="products-container">
                <div class="products-grid" id="productsGrid">
                    <!-- Los productos se cargarán aquí con JavaScript -->
                </div>
            </main>
        </div>
    </div>

    <!-- Modal del carrito -->
    <div id="cartModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>🛒 Tu Carrito</h2>
            <div id="cartItems" class="cart-items">
                <!-- Items del carrito irán aquí -->
            </div>
            <div class="cart-summary">
                <h3>Total: $<span id="totalPrice">0.00</span></h3>
                <button class="checkout-btn" id="checkoutBtn">Proceder al Pago</button>
            </div>
        </div>
    </div>

    <!-- Modal de checkout -->
    <div id="checkoutModal" class="modal hidden">
        <div class="modal-content checkout-modal">
            <span class="close-btn">&times;</span>
            <h2>Información de Compra</h2>
            <form id="checkoutForm">
                <div class="form-group">
                    <label for="fullName">Nombre Completo:</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Teléfono:</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label for="address">Dirección:</label>
                    <input type="text" id="address" required>
                </div>
                <div class="form-group">
                    <label for="city">Ciudad:</label>
                    <input type="text" id="city" required>
                </div>
                <div class="form-group">
                    <label for="postalCode">Código Postal:</label>
                    <input type="text" id="postalCode" required>
                </div>
                <div class="form-group">
                    <label for="cardNumber">N��mero de Tarjeta:</label>
                    <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="expiryDate">Fecha Vencimiento:</label>
                        <input type="text" id="expiryDate" placeholder="MM/AA" required>
                    </div>
                    <div class="form-group">
                        <label for="cvv">CVV:</label>
                        <input type="text" id="cvv" placeholder="123" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Completar Compra</button>
            </form>
        </div>
    </div>

    <script src="products.js"></script>
    <script src="app.js"></script>
</body>
</html>
